<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maria Amélia</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300&family=Raleway:wght@300&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;
    background:#f5f5f5;
}

.hero{
    position:relative;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:url('FUNDO.jpg') center center/cover no-repeat;
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(255,255,255,0.55);
}

.content{
    position:relative;
    z-index:2;
    width:100%;
    max-width:430px;
    text-align:center;
}

/* FOTO */
.foto-container{
    margin-bottom:18px;
}

.foto{
    width:155px;
    height:155px;
    object-fit:cover;
    border-radius:50%;
    border:4px solid #ffffff;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

/* NOME NO LUGAR DO LOGO */
.nome{
    font-family:'Montserrat','Raleway',sans-serif;
    font-weight:300;
    font-size:22px;
    text-transform:uppercase;
    letter-spacing:8px;
    color:#050505;
    margin-bottom:20px;
    line-height:1.5;
}

/* TEXTO */
.frase{
    font-size:15px;
    color:#222;
    line-height:1.6;
    margin-bottom:22px;
    padding:0 10px;
}

/* LINKS */
.links{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.links a{
    text-decoration:none;
    background:#111;
    color:#fff;
    padding:14px 18px;
    border-radius:14px;
    font-size:15px;
    font-weight:500;
    transition:0.3s;
}

.links a:hover{
    transform:translateY(-2px);
    background:#000;
}

/* CELULAR PEQUENO */
@media(max-height:700px){
    .foto{
        width:130px;
        height:130px;
    }

    .nome{
        font-size:18px;
        letter-spacing:6px;
        margin-bottom:14px;
    }

    .frase{
        font-size:14px;
        margin-bottom:16px;
    }

    .links a{
        padding:12px;
        font-size:14px;
    }
}
</style>

</head>
<body>

<section class="hero">

<div class="overlay"></div>

<div class="content">

    <!-- FOTO TOPO -->
    <div class="foto-container">
        <img src="FOTO01.png" class="foto">
    </div>

    <!-- NOME NO LUGAR DO LOGO -->
    <div class="nome">
        Maria Amélia
    </div>

    <!-- TEXTO -->
    <p class="frase">
        🏛️ Vice-presidente do PL Mulher DF <br>
        Pré Candidata a Deputada Federal <br>
        Política, família e compromisso com Brasília 💚
    </p>

    <!-- LINKS -->
    <div class="links">

        <a href="https://wa.me/5561999999999" target="_blank">
            💬 WhatsApp
        </a>

        <a href="https://instagram.com/mariaamelia.df" target="_blank">
            📸 Instagram
        </a>

        <a href="https://instagram.com/mariaameliadoces" target="_blank">
            🍰 Empresária
        </a>

        <a href="mailto:contato@mariaamelia.com">
            📩 Email
        </a>

    </div>

</div>

</section>

</body>
</html>
